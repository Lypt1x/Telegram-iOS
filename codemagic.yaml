workflows:
  ghost-mode-build:
    name: Swiftgram Ghost Mode
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - telegram_secrets
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: ghost-mode
          include: true
        - pattern: feature/*
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Set Xcode version from repo
        script: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          echo "Required Xcode: $XCODE_VERSION"
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer || \
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Download Metal Toolchain
        script: |
          echo "Downloading Metal Toolchain (required for Xcode 26+)..."
          xcodebuild -downloadComponent MetalToolchain || true
          echo "Metal Toolchain download complete"

      - name: Install build dependencies
        script: |
          brew install ccache || true
          echo "ccache at: $(which ccache)"

          # Configure ccache for persistent caching across CI builds
          export CCACHE_DIR="/Users/Shared/ccache"
          mkdir -p "$CCACHE_DIR"
          ccache --set-config=cache_dir="$CCACHE_DIR"
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache -z  # Reset stats for this build
          echo "ccache configured: dir=$CCACHE_DIR"

      - name: Create canonical source directory
        script: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $CM_BUILD_DIR /Users/Shared/telegram-ios
          cd /Users/Shared/telegram-ios

          # Fix: Bazel genrule sandbox has PATH=/usr/bin:/bin:/usr/sbin:/sbin
          # ccache is at /opt/homebrew/bin. Patch both the BUILD genrule PATH
          # and the build script to include Homebrew paths.

          # 1) Patch the td BUILD genrule: PATH="$$CMAKE_DIR/..." -> PATH="/opt/homebrew/bin:...$$CMAKE_DIR/..."
          sed -i '' 's|PATH="$$CMAKE_DIR|PATH="/opt/homebrew/bin:/usr/local/bin:$$CMAKE_DIR|' third-party/td/BUILD
          echo "BUILD patch applied:"
          grep 'opt/homebrew' third-party/td/BUILD || echo "WARNING: BUILD patch did not apply"

          # 2) Also patch build-td-bazel.sh to add Homebrew to PATH
          head -1 third-party/td/build-td-bazel.sh > /tmp/td-build-fixed.sh
          echo 'export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"' >> /tmp/td-build-fixed.sh
          tail -n +2 third-party/td/build-td-bazel.sh >> /tmp/td-build-fixed.sh
          mv /tmp/td-build-fixed.sh third-party/td/build-td-bazel.sh
          chmod +x third-party/td/build-td-bazel.sh
          echo "build-td-bazel.sh patch applied:"
          head -3 third-party/td/build-td-bazel.sh

      - name: Inject API keys
        script: |
          cd /Users/Shared/telegram-ios
          python3 << 'PYEOF'
          import json, os
          with open('build-system/appstore-configuration.json', 'r') as f:
              config = json.load(f)
          config['api_id'] = os.environ.get('TELEGRAM_API_ID', 'PLACEHOLDER')
          config['api_hash'] = os.environ.get('TELEGRAM_API_HASH', 'PLACEHOLDER')
          with open('build-system/appstore-configuration.json', 'w') as f:
              json.dump(config, f, indent=2)
          print('API keys injected:', config['api_id'][:4] + '...')
          PYEOF

      - name: Build the App
        script: |
          set -x
          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          BAZEL_CACHE_DIR="/Users/Shared/bazel-cache"
          mkdir -p "$BAZEL_CACHE_DIR"
          cd $SOURCE_DIR

          # Export ccache dir so build subprocesses inherit it
          export CCACHE_DIR="/Users/Shared/ccache"

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --cacheDir="$BAZEL_CACHE_DIR" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

      - name: Cache diagnostics
        script: |
          echo "=== Bazel cache ==="
          du -sh /private/var/tmp/_bazel_containerhost 2>/dev/null || echo "No Bazel user root"
          du -sh /Users/Shared/bazel-cache 2>/dev/null || echo "No Bazel disk cache"
          echo "=== ccache stats ==="
          export CCACHE_DIR="/Users/Shared/ccache"
          ccache -s 2>/dev/null || echo "ccache not available"
          echo "=== Homebrew cache ==="
          du -sh "$HOME/Library/Caches/Homebrew" 2>/dev/null || echo "No Homebrew cache"

      - name: Collect and strip IPA
        script: |
          set -x
          cd /Users/Shared/telegram-ios
          OUTPUT_PATH="build/artifacts"
          mkdir -p "$OUTPUT_PATH"
          cp bazel-bin/Telegram/Swiftgram.ipa "$OUTPUT_PATH/Swiftgram-raw.ipa"

          cd "$OUTPUT_PATH"
          mkdir -p ipa_tmp && cd ipa_tmp
          unzip -q ../Swiftgram-raw.ipa

          # Strip Watch app and extensions that cause sideload issues
          rm -rf Payload/Swiftgram.app/Watch && echo "Removed Watch"
          rm -rf Payload/Swiftgram.app/PlugIns && echo "Removed PlugIns"

          ls -la Payload/Swiftgram.app/

          zip -r -q ../Swiftgram.ipa Payload/
          cd ..
          rm -rf ipa_tmp Swiftgram-raw.ipa
          ls -la Swiftgram.ipa

      - name: Publish GitHub Release and update SideStore source
        script: |
          set -x
          cd /Users/Shared/telegram-ios

          APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          COMMIT_COUNT=$(git rev-list --count HEAD)
          BUILD_NUMBER="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          TAG="v${APP_VERSION}-${BUILD_NUMBER}"
          IPA_PATH="build/artifacts/Swiftgram.ipa"
          IPA_SIZE=$(stat -f%z "$IPA_PATH")
          TODAY=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Create or update GitHub release and upload IPA
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "$IPA_PATH" \
            --repo Lypt1x/Telegram-iOS \
            --title "Swiftgram $APP_VERSION ($BUILD_NUMBER)" \
            --notes "Automated build from Codemagic CI\nCommit: $CM_COMMIT\nBuild: $BUILD_NUMBER" \
            --latest

          # Update docs/apps.json with new version, date, size
          python3 << PYEOF
          import json, os

          with open('docs/apps.json', 'r') as f:
              source = json.load(f)

          app = source['apps'][0]
          app['version'] = os.environ.get('APP_VERSION', app['version'])
          app['versionDate'] = '$TODAY'
          app['versionDescription'] = 'Build $BUILD_NUMBER — commit $CM_COMMIT'
          app['downloadURL'] = 'https://github.com/Lypt1x/Telegram-iOS/releases/download/$TAG/Swiftgram.ipa'
          app['size'] = $IPA_SIZE

          with open('docs/apps.json', 'w') as f:
              json.dump(source, f, indent=2)

          print('apps.json updated:', app['version'], app['downloadURL'])
          PYEOF

          # Configure git to push using GH_TOKEN (Codemagic clone token is read-only)
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/Lypt1x/Telegram-iOS.git"

          # Commit and push updated apps.json
          git config user.email "codemagic-bot@users.noreply.github.com"
          git config user.name "Codemagic Bot"
          git add docs/apps.json
          git diff --cached --quiet || git commit -m "chore: update SideStore source for $TAG [skip ci]"
          git push origin HEAD

    artifacts:
      - /Users/Shared/telegram-ios/build/artifacts/Swiftgram.ipa

    cache:
      cache_paths:
        - /private/var/tmp/_bazel_containerhost
        - /Users/Shared/bazel-cache
        - /Users/Shared/ccache
        - $HOME/Library/Caches/Homebrew