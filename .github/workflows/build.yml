name: CI
on:
  push:
    branches: [ ghost-mode ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Restore Bazel cache
        uses: actions/cache@v4
        with:
          path: /private/var/tmp/_bazel_containerhost
          key: bazel-${{ runner.os }}-${{ hashFiles('**/BUILD', '**/WORKSPACE', 'versions.json') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Inject API keys
        run: |
          cd /Users/Shared/telegram-ios
          python3 << 'PYEOF'
          import json
          with open('build-system/appstore-configuration.json', 'r') as f:
              config = json.load(f)
          config['api_id'] = '${{ secrets.TELEGRAM_API_ID }}'
          config['api_hash'] = '${{ secrets.TELEGRAM_API_HASH }}'
          with open('build-system/appstore-configuration.json', 'w') as f:
              json.dump(config, f, indent=2)
          print('API keys injected')
          PYEOF

      - name: Build the App
        run: |
          set -x
          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

      - name: Collect and strip IPA
        run: |
          set -x
          cd /Users/Shared/telegram-ios
          OUTPUT_PATH="build/artifacts"
          mkdir -p "$OUTPUT_PATH"
          cp bazel-bin/Telegram/Swiftgram.ipa "$OUTPUT_PATH/Swiftgram-raw.ipa"

          cd "$OUTPUT_PATH"
          mkdir -p ipa_tmp && cd ipa_tmp
          unzip -q ../Swiftgram-raw.ipa

          # Strip Watch app and extensions that cause sideload issues
          rm -rf Payload/Swiftgram.app/Watch && echo "Removed Watch"
          rm -rf Payload/Swiftgram.app/PlugIns && echo "Removed PlugIns"

          ls -la Payload/Swiftgram.app/

          zip -r -q ../Swiftgram.ipa Payload/
          cd ..
          rm -rf ipa_tmp Swiftgram-raw.ipa
          ls -la Swiftgram.ipa

          # dSYMs
          cd /Users/Shared/telegram-ios
          mkdir -p build/DSYMs
          cp -R bazel-bin/Telegram/*.dSYM build/DSYMs/ 2>/dev/null || true
          cd "$OUTPUT_PATH"
          zip -r Swiftgram.DSYMs.zip ../DSYMs 1>/dev/null || echo "dSYM zip skipped"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          release_name: Swiftgram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }}) Ghost Mode
          body: |
            Swiftgram for iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }}) with Ghost Mode.
            Unsigned IPA - sideload with AltStore, Sideloadly, or TrollStore.
            Extensions stripped for sideloading compatibility.
          draft: false
          prerelease: false

      - name: Upload Release IPA
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/Swiftgram.ipa
          asset_name: Swiftgram.ipa
          asset_content_type: application/zip

      - name: Upload Release DSYM
        if: success()
        continue-on-error: true
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/Swiftgram.DSYMs.zip
          asset_name: Swiftgram.DSYMs.zip
          asset_content_type: application/zip


